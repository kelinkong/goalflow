services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: REDACTED_PASSWORD
      MYSQL_DATABASE: goalflow
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password

  backend:
    image: openjdk:17-jdk-slim
    container_name: backend
    restart: always
    volumes:
      - ./app:/app
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    working_dir: /app
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/goalflow?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: REDACTED_PASSWORD
    command: ["java", "-jar", "app.jar"]
    depends_on:
      - mysql

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./www:/usr/share/nginx/html:ro
      - ./uploads:/data/uploads:ro
    depends_on:
      - backend
