server:
  port: 8081

spring:
  application:
    name: goalflow-api
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/goalflow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    driverClassName: com.mysql.cj.jdbc.Driver
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    name: /app/logs/goalflow.log
  level:
    com.goalflow.api: INFO
    com.goalflow.api.controller: DEBUG
    org.springframework.security: INFO
    # 彻底关闭 SQL 日志
    com.goalflow.api.mapper: INFO
    com.baomidou.mybatisplus: WARN
    org.apache.ibatis: WARN

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen3-max-2026-01-23
  decompose-model: ${OPENAI_DECOMPOSE_MODEL:qwen3.5-plus-2026-02-15}
  enable-search: ${OPENAI_ENABLE_SEARCH:true}
  search-strategy: ${OPENAI_SEARCH_STRATEGY:turbo}

jwt:
  secret: ${JWT_SECRET:YOUR_JWT_SECRET}

goalflow:
  admin:
    emails: ${ADMIN_EMAILS:admin@goalflow.com}
