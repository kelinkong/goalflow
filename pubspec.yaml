name: goalflow
description: AI-powered goal tracker with daily task management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  permission_handler: ^12.0.1
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_timezone: ^4.1.1
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/logo.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/branding/logo.png
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: assets/branding/logo.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/logo.png
